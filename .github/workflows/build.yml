name: Build FennecSwap Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download BakkesMod SDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/bakkesmodorg/BakkesModSDK/releases/latest/download/BakkesModSDK.zip" -OutFile "SDK.zip"
          Expand-Archive -Path "SDK.zip" -DestinationPath "BakkesModSDK"

      - name: Build DLL
        shell: powershell
        run: msbuild FennecSwap.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: FennecSwap-DLL
          path: x64/Release/FennecSwap.dll
          if-no-files-found: error
