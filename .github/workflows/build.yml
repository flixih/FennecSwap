name: Build FennecSwap Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Clone BakkesMod SDK
        run: git clone https://github.com/bakkesmodorg/BakkesModSDK.git BakkesModSDK

      - name: List SDK include structure
        shell: powershell
        run: Get-ChildItem -Recurse BakkesModSDK\include -Filter "*.h" | Select-Object FullName | Out-File sdk_files.txt; Get-Content sdk_files.txt

      - name: Build DLL
        shell: powershell
        run: msbuild FennecSwap.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: FennecSwap-DLL
          path: x64/Release/FennecSwap.dll
          if-no-files-found: error
